<div>
  <h3>Counter: {{ count$ | async }}</h3>
  <button (click)="decrement()">decrement</button>
  <!-- {{ producties$ | async | json }} -->
</div>
<div class="products">
  @if (products$ | async) {
    @for (product of products$ | async; track product.title) {
      <app-card
        [name]="product.title"
        [price]="product.price"
        [url]="product.thumbnail"
        [id]="product.id"
      >
      </app-card>
    }
  }
</div>
