@if (product() !== null) {
  <p>{{ product()?.title }}</p>
  <p>{{ product()?.brand }}</p>
  <p>{{ product()?.category }}</p>
  <p>{{ product()?.price }}</p>

  @for (image of product()?.images; track image) {
    <img 
      [src]="image" 
      alt="product image"
      height="300"
      weidth="400"

    />
  }
}
