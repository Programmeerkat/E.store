<div>
  <a [routerLink]="['/product', id()]">
    <img [src]="url()" />
    <p class="title">{{ name() ? name() : 'Default name' }}</p>
    <p class="price">€{{ price() }}</p>
    @if (price() < 1 ? true : false) {
      <p>On Sale!</p>
    }
  </a>
  <button (click)="deleteMe($event)">delete me</button>
</div>
